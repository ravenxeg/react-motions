name: Feature Request
description: Suggest a new preset, component, or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any workarounds or alternative solutions you've considered
